<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-PONG MULTIPLAYER</title>
    <!-- Einbindung der Echtzeit-Bibliothek für Multiplayer-Synchronisation -->
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000000; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; border: 3px solid #ffffff; padding: 30px; background-color: #000000; box-shadow: 8px 8px 0px #ffffff; }
        h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; border-bottom: 3px solid #ffffff; padding-bottom: 10px; text-align: center; }
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; color: #aaaaaa; }
        input { background-color: #000000; color: #ffffff; border: 2px solid #ffffff; padding: 12px; width: 100%; font-size: 16px; margin-top: 8px; margin-bottom: 15px; outline: none; }
        button { background-color: #ffffff; color: #000000; border: 2px solid #ffffff; padding: 15px 20px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; width: 100%; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #000000; color: #ffffff; }
        .view { display: none; }
        .active-view { display: block; }
        #question-display { font-size: 20px; font-weight: bold; border: 2px solid #ffffff; padding: 20px; margin: 20px 0; min-height: 120px; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="view-login" class="view active-view">
            <h1>QR-PONG</h1>
            <label>DEIN NAME</label>
            <input type="text" id="username" maxlength="12">
            <label>RAUM-CODE</label>
            <input type="tel" id="roomcode" maxlength="4">
            <button onclick="connectToGame()">SPIEL BEITRETEN</button>
        </div>
        <div id="view-lobby" class="view">
            <h1 id="lobby-title">RAUM: ----</h1>
            <h2>KATEGORIE</h2>
            <button onclick="selectCategory('klassik')">KLASSIK</button>
            <button onclick="selectCategory('intim')">INTIM</button>
            <button onclick="selectCategory('extrem')">EXTREM</button>
        </div>
        <div id="view-card" class="view">
            <h1 id="card-category">KATEGORIE</h1>
            <div id="question-display">Lade Frage...</div>
            <button onclick="sendBackToLobby()">NÄCHSTE RUNDE</button>
        </div>
    </div>
    <script>
        const questionPool = {
            klassik: ["Trink 2 Schlucke.", "Bestimme jemanden, der 3 Schlucke trinkt.", "Nenne 5 Biermarken in 10s."],
            intim: ["Was war dein peinlichstes Date?", "Beichte ein Geheimnis.", "Wer ist dein Typ hier?"],
            extrem: ["Tausche Oberteil mit Nachbarn.", "Ex den Becher.", "10 Liegestütze."]
        };
        let mqttClient = null, currentRoom = "", myName = "";
        function connectToGame() {
            myName = document.getElementById("username").value;
            currentRoom = document.getElementById("roomcode").value;
            mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            mqttClient.on('connect', () => {
                mqttClient.subscribe(`qrpong/room/${currentRoom}`);
                document.getElementById("lobby-title").innerText = `RAUM: ${currentRoom}`;
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
                document.getElementById('view-lobby').classList.add('active-view');
            });
            mqttClient.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                if (data.type === "SHOW_QUESTION") {
                    document.getElementById("card-category").innerText = data.category.toUpperCase();
                    document.getElementById("question-display").innerText = data.text;
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
                    document.getElementById('view-card').classList.add('active-view');
                } else if (data.type === "GO_LOBBY") {
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
                    document.getElementById('view-lobby').classList.add('active-view');
                }
            });
        }
        function selectCategory(cat) {
            const text = questionPool[cat][Math.floor(Math.random() * questionPool[cat].length)];
            mqttClient.publish(`qrpong/room/${currentRoom}`, JSON.stringify({type: "SHOW_QUESTION", category: cat, text: text}));
        }
        function sendBackToLobby() {
            mqttClient.publish(`qrpong/room/${currentRoom}`, JSON.stringify({type: "GO_LOBBY"}));
        }
    </script>
</body>
</html>
